name: Homebrew Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '10.0.x'
  APP_NAME: cv4pve-diag

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - rid: osx-x64
            arch: x86_64
          - rid: osx-arm64
            arch: arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: |
          dotnet publish src/Corsinvest.ProxmoxVE.Diagnostic/Corsinvest.ProxmoxVE.Diagnostic.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/${{ matrix.rid }}

      - name: Create tarball
        run: |
          cd publish/${{ matrix.rid }}
          tar -czvf ../../${{ env.APP_NAME }}-${{ matrix.arch }}.tar.gz ${{ env.APP_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.arch }}
          path: ${{ env.APP_NAME }}-${{ matrix.arch }}.tar.gz

  release-homebrew:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz

      - name: Calculate SHA256
        id: sha
        run: |
          echo "SHA_X64=$(sha256sum artifacts/${{ env.APP_NAME }}-x86_64/${{ env.APP_NAME }}-x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "SHA_ARM64=$(sha256sum artifacts/${{ env.APP_NAME }}-arm64/${{ env.APP_NAME }}-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create Homebrew formula
        run: |
          cat > ${{ env.APP_NAME }}.rb << 'EOF'
          class Cv4pveDiag < Formula
            desc "Diagnostic Tool for Proxmox VE"
            homepage "https://github.com/${{ github.repository }}"
            version "${{ steps.version.outputs.VERSION }}"
            license "GPL-3.0"

            on_macos do
              on_intel do
                url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.APP_NAME }}-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.SHA_X64 }}"
              end
              on_arm do
                url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.APP_NAME }}-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.SHA_ARM64 }}"
              end
            end

            def install
              bin.install "${{ env.APP_NAME }}"
            end

            test do
              assert_match "cv4pve-diag", shell_output("#{bin}/${{ env.APP_NAME }} --version")
            end
          end
          EOF

      - name: Push to Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ github.repository_owner }}/homebrew-tap.git
          cd homebrew-tap
          mkdir -p Formula
          mv ../${{ env.APP_NAME }}.rb Formula/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/${{ env.APP_NAME }}.rb
          git commit -m "Update ${{ env.APP_NAME }} to ${{ steps.version.outputs.VERSION }}"
          git push
